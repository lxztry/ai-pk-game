<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI竞技平台 - 排行榜</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        header {
            text-align: center;
            padding: 40px 0;
        }
        
        h1 {
            font-size: 2.5rem;
            background: linear-gradient(90deg, #00d9ff, #00ff88);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }
        
        .subtitle {
            color: #888;
            font-size: 1.1rem;
        }
        
        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin: 30px 0;
            flex-wrap: wrap;
        }
        
        .stat-item {
            background: rgba(255,255,255,0.1);
            padding: 20px 30px;
            border-radius: 12px;
            text-align: center;
            min-width: 150px;
        }
        
        .stat-value {
            font-size: 2rem;
            font-weight: bold;
            color: #00d9ff;
        }
        
        .stat-label {
            color: #888;
            margin-top: 5px;
        }
        
        .tabs {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 30px 0;
        }
        
        .tab {
            padding: 12px 30px;
            background: rgba(255,255,255,0.1);
            border: none;
            border-radius: 25px;
            color: #888;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s;
        }
        
        .tab:hover {
            background: rgba(255,255,255,0.2);
            color: #fff;
        }
        
        .tab.active {
            background: linear-gradient(90deg, #00d9ff, #00ff88);
            color: #1a1a2e;
            font-weight: bold;
        }
        
        .section {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 30px;
        }
        
        .section-title {
            font-size: 1.3rem;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .badge {
            display: inline-flex;
            align-items: center;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.85rem;
            font-weight: normal;
        }
        
        .badge-ai {
            background: rgba(0, 217, 255, 0.2);
            color: #00d9ff;
        }
        
        .badge-human {
            background: rgba(255, 107, 107, 0.2);
            color: #ff6b6b;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th, td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        th {
            color: #888;
            font-weight: 500;
            font-size: 0.9rem;
        }
        
        tr:hover {
            background: rgba(255,255,255,0.05);
        }
        
        .rank {
            font-weight: bold;
            font-size: 1.2rem;
        }
        
        .rank-1 { color: #ffd700; }
        .rank-2 { color: #c0c0c0; }
        .rank-3 { color: #cd7f32; }
        
        .player-name {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .points {
            font-weight: bold;
            color: #00ff88;
        }
        
        .win-rate {
            color: #888;
        }
        
        .ai-vs-human {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }
        
        .vs-card {
            background: rgba(255,255,255,0.05);
            padding: 25px;
            border-radius: 12px;
            text-align: center;
        }
        
        .vs-icon {
            font-size: 3rem;
            margin-bottom: 10px;
        }
        
        .vs-rate {
            font-size: 2.5rem;
            font-weight: bold;
        }
        
        .vs-label {
            color: #888;
            margin-top: 5px;
        }
        
        footer {
            text-align: center;
            padding: 30px;
            color: #666;
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }
        
        .empty-state .icon {
            font-size: 4rem;
            margin-bottom: 20px;
        }
        
        @media (max-width: 768px) {
            .ai-vs-human {
                grid-template-columns: 1fr;
            }
            
            table {
                font-size: 0.9rem;
            }
            
            th, td {
                padding: 10px 5px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🏟️ AI竞技平台</h1>
            <p class="subtitle">NBA式持续赛事运营系统</p>
        </header>
        
        <div class="stats-bar">
            <div class="stat-item">
                <div class="stat-value" id="total-players">-</div>
                <div class="stat-label">注册选手</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="total-matches">-</div>
                <div class="stat-label">总比赛场次</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="ai-count">-</div>
                <div class="stat-label">🤖 AI选手</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="human-count">-</div>
                <div class="stat-label">👤 人类选手</div>
            </div>
        </div>
        
        <div class="tabs">
            <button class="tab active" data-tab="overall">📊 总榜</button>
            <button class="tab" data-tab="ai">🤖 AI选手榜</button>
            <button class="tab" data-tab="human">👤 人类选手榜</button>
        </div>
        
        <div class="section">
            <h2 class="section-title">🏆 <span id="tab-title">总积分榜</span></h2>
            
            <div id="rankings-table">
                <table>
                    <thead>
                        <tr>
                            <th>排名</th>
                            <th>选手</th>
                            <th>类型</th>
                            <th>积分</th>
                            <th>场次</th>
                            <th>胜率</th>
                            <th>击杀</th>
                        </tr>
                    </thead>
                    <tbody id="rankings-body">
                        <tr>
                            <td colspan="7" class="empty-state">
                                <div class="icon">📭</div>
                                <p>暂无数据</p>
                                <p>运行每日赛事后将在此显示排名</p>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
        
        <div class="section">
            <h2 class="section-title">🤖 vs 👤 对决统计</h2>
            <div class="ai-vs-human">
                <div class="vs-card">
                    <div class="vs-icon">🤖</div>
                    <div class="vs-rate" id="ai-win-rate">-%</div>
                    <div class="vs-label">AI选手胜率</div>
                </div>
                <div class="vs-card">
                    <div class="vs-icon">👤</div>
                    <div class="vs-rate" id="human-win-rate">-%</div>
                    <div class="vs-label">人类选手胜率</div>
                </div>
            </div>
        </div>
        
        <footer>
            <p>AI竞技平台 | NBA式持续赛事运营系统</p>
            <p id="last-updated">最后更新: -</p>
        </footer>
    </div>
    
    <script>
        // 数据加载
        async function loadLeaderboard() {
            try {
                const response = await fetch('../data/leaderboard.json');
                if (!response.ok) throw new Error('No data');
                const data = await response.json();
                renderLeaderboard(data);
            } catch (e) {
                // 尝试本地数据
                loadSampleData();
            }
        }
        
        function loadSampleData() {
            // 示例数据（当没有真实数据时显示）
            const sampleData = {
                updated_at: new Date().toISOString(),
                total_participants: 8,
                overall: [
                    { rank: 1, display_name: '🤖 SmartAgent', type: 'ai', total_points: 156, total_matches: 52, win_rate: 73.1, total_kills: 186 },
                    { rank: 2, display_name: '🤖 AggressiveAgent', type: 'ai', total_points: 142, total_matches: 52, win_rate: 65.4, total_kills: 154 },
                    { rank: 3, display_name: '🤖 SurvivalAgent', type: 'ai', total_points: 128, total_matches: 52, win_rate: 59.6, total_kills: 98 },
                    { rank: 4, display_name: '🤖 TacticalAgent', type: 'ai', total_points: 115, total_matches: 52, win_rate: 53.8, total_kills: 134 },
                    { rank: 5, display_name: '🤖 WeaponHunter', type: 'ai', total_points: 98, total_matches: 52, win_rate: 46.2, total_kills: 167 },
                    { rank: 6, display_name: '🤖 LXZAgent', type: 'ai', total_points: 87, total_matches: 52, win_rate: 40.4, total_kills: 89 },
                    { rank: 7, display_name: '🤖 ExampleAgent', type: 'ai', total_points: 65, total_matches: 52, win_rate: 30.8, total_kills: 67 },
                    { rank: 8, display_name: '🤖 TestAgent', type: 'ai', total_points: 42, total_matches: 52, win_rate: 19.2, total_kills: 45 }
                ],
                ai_vs_human: {
                    ai_win_rate: 72.5,
                    human_win_rate: 27.5
                }
            };
            renderLeaderboard(sampleData);
        }
        
        function renderLeaderboard(data) {
            // 更新统计数据
            document.getElementById('total-players').textContent = data.total_participants || data.overall?.length || 0;
            document.getElementById('total-matches').textContent = data.overall?.reduce((sum, p) => sum + (p.total_matches || 0), 0) || 0;
            document.getElementById('ai-count').textContent = data.overall?.filter(p => p.type === 'ai').length || 0;
            document.getElementById('human-count').textContent = data.overall?.filter(p => p.type === 'human').length || 0;
            
            // 更新 AI vs Human
            if (data.ai_vs_human) {
                document.getElementById('ai-win-rate').textContent = data.ai_vs_human.ai_win_rate + '%';
                document.getElementById('human-win-rate').textContent = data.ai_vs_human.human_win_rate + '%';
            }
            
            // 更新时间
            if (data.updated_at) {
                const date = new Date(data.updated_at);
                document.getElementById('last-updated').textContent = '最后更新: ' + date.toLocaleString('zh-CN');
            }
            
            // 渲染排行榜
            renderTable(data.overall || []);
        }
        
        function renderTable(players) {
            const tbody = document.getElementById('rankings-body');
            
            if (players.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="7" class="empty-state">
                            <div class="icon">📭</div>
                            <p>暂无数据</p>
                        </td>
                    </tr>
                `;
                return;
            }
            
            tbody.innerHTML = players.map(p => {
                const rankClass = p.rank <= 3 ? `rank-${p.rank}` : '';
                const badgeClass = p.type === 'ai' ? 'badge-ai' : 'badge-human';
                const badgeText = p.type === 'ai' ? '🤖 AI' : '👤 人类';
                
                return `
                    <tr>
                        <td class="rank ${rankClass}">#${p.rank}</td>
                        <td class="player-name">
                            <span>${p.display_name || p.name}</span>
                        </td>
                        <td><span class="badge ${badgeClass}">${badgeText}</span></td>
                        <td class="points">${p.total_points || 0}</td>
                        <td>${p.total_matches || 0}</td>
                        <td class="win-rate">${p.win_rate || 0}%</td>
                        <td>${p.total_kills || 0}</td>
                    </tr>
                `;
            }).join('');
        }
        
        // Tab 切换
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', async () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                
                const tabType = tab.dataset.tab;
                const titleMap = {
                    'overall': '总积分榜',
                    'ai': 'AI选手榜',
                    'human': '人类选手榜'
                };
                document.getElementById('tab-title').textContent = titleMap[tabType];
                
                // 加载对应数据
                try {
                    const response = await fetch('../data/leaderboard.json');
                    const data = await response.json();
                    
                    let players = [];
                    if (tabType === 'overall') {
                        players = data.overall || [];
                    } else if (tabType === 'ai') {
                        players = data.ai_leaderboard || (data.overall || []).filter(p => p.type === 'ai');
                    } else {
                        players = data.human_leaderboard || (data.overall || []).filter(p => p.type === 'human');
                    }
                    
                    renderTable(players);
                } catch (e) {
                    loadSampleData();
                }
            });
        });
        
        // 初始加载
        loadLeaderboard();
        
        // 每分钟自动刷新
        setInterval(loadLeaderboard, 60000);
    </script>
</body>
</html>
